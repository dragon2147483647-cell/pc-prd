<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 文档助手</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 保证 body 没有多余的外边距，并且占满屏幕 */
    body { margin: 0; padding: 0; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ==========================================
    // 图标库 (完美还原 lucide-react，无需 npm)
    // ==========================================
    const Icon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Menu = (p) => <Icon {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></Icon>;
    const Send = (p) => <Icon {...p}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></Icon>;
    const Paperclip = (p) => <Icon {...p}><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
    const MessageSquare = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
    const LayoutTemplate = (p) => <Icon {...p}><rect width="18" height="7" x="3" y="3" rx="1"/><rect width="9" height="7" x="3" y="14" rx="1"/><rect width="5" height="7" x="16" y="14" rx="1"/></Icon>;
    const Settings2 = (p) => <Icon {...p}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="7" cy="17" r="3"/></Icon>;
    const Check = (p) => <Icon {...p}><path d="M20 6 9 17l-5-5"/></Icon>;

    // ==========================================
    // 主应用组件 App (完整保留你提供的逻辑与类名)
    // ==========================================
    function App() {
      // === 状态管理 ===
      const [panelView, setPanelView] = useState('chat');
      const [messages, setMessages] = useState([
        {
          id: 1,
          role: 'bot',
          type: 'text',
          content: '你好！我是 AI 文档助手。有什么我可以帮你的？',
        }
      ]);
      const [inputValue, setInputValue] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [documentStyle, setDocumentStyle] = useState('default'); 
      
      const chatEndRef = useRef(null);
      const fileInputRef = useRef(null);

      // 自动滚动
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isTyping]);

      // 全局滚动条美化 (解决 Windows 下滚动条挤压内容的问题)
      useEffect(() => {
        const style = document.createElement('style');
        style.innerHTML = `
          ::-webkit-scrollbar { width: 6px; height: 6px; }
          ::-webkit-scrollbar-track { background: transparent; }
          ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
          ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        `;
        document.head.appendChild(style);
        return () => document.head.removeChild(style);
      }, []);

      // === 交互逻辑 ===
      const addMessage = (msg) => {
        setMessages(prev => [...prev, { ...msg, id: Date.now() }]);
      };

      const handleQuickActionBeautify = () => {
        addMessage({ role: 'user', type: 'text', content: '排版美化' });
        setIsTyping(true);
        setTimeout(() => {
          setIsTyping(false);
          addMessage({
            role: 'bot',
            type: 'widget',
            content: '好的，请选择你希望的排版美化方式：',
            widgetType: 'beautify_options'
          });
        }, 600);
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        addMessage({
          role: 'user',
          type: 'file',
          fileName: file.name,
          content: `帮我解析这篇文档的格式，并且将解析后的文档格式套用到当前文档中。`
        });
        processAITypography('正在解析模板格式并应用...');
      };

      const handleCustomLayoutSubmit = (promptText) => {
        setPanelView('chat'); 
        addMessage({ role: 'user', type: 'text', content: promptText });
        processAITypography('正在根据您的自定义配置调整全文格式...');
      };

      const processAITypography = (loadingText) => {
        setIsTyping(true);
        setTimeout(() => {
          setIsTyping(false);
          addMessage({
            role: 'bot',
            type: 'process',
            content: loadingText,
            steps: [
              '识别到标题字体需修改',
              '识别到正文字体需修改',
              '正在调整行距与段落...',
              '包含首行缩进处理中...'
            ]
          });
          
          setTimeout(() => {
            setDocumentStyle('beautified'); 
            setMessages(prev => {
              const newMsgs = [...prev];
              newMsgs[newMsgs.length - 1].isDone = true;
              return newMsgs;
            });
            addMessage({
              role: 'bot',
              type: 'text',
              content: '✅ 已完成排版！你可以滚动查看左侧文档的效果是否满意？'
            });
          }, 2500);
        }, 800);
      };

      return (
        <div className="flex h-screen w-full bg-[#f4f5f7] overflow-hidden text-gray-800 font-sans">
          
          {/* 侧边栏 (强约束宽度，不可被压缩) */}
          <div className="w-14 shrink-0 bg-white border-r border-gray-200 flex flex-col items-center py-4 gap-6 z-20">
            <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">T</div>
            <MessageSquare className="w-5 h-5 text-gray-400 cursor-pointer hover:text-blue-600" />
            <FileText className="w-5 h-5 text-gray-400 cursor-pointer hover:text-blue-600" />
          </div>

          {/* 左侧：文档编辑区 (min-w-0 保证 Flex 容器不被撑破) */}
          <div className="flex-1 flex flex-col relative min-w-0">
            <div className="h-14 bg-white border-b border-gray-200 flex items-center px-4 justify-between select-none shrink-0 z-10">
              <div className="flex items-center gap-4 text-sm">
                <span className="font-semibold text-gray-700">在线文档.docx</span>
                <div className="flex gap-4 text-gray-500">
                  <span className="cursor-pointer hover:text-gray-800">开始</span>
                  <span className="cursor-pointer hover:text-gray-800">插入</span>
                  <span className="cursor-pointer text-blue-600 font-medium border-b-2 border-blue-600 pb-4 translate-y-[2px]">AI 工具</span>
                </div>
              </div>
              <button className="bg-blue-600 text-white px-4 py-1.5 rounded text-sm font-medium hover:bg-blue-700">分享</button>
            </div>

            {/* 虚拟文档内容区 (自身携带 overflow-auto 消化超长/超宽内容) */}
            <div className="flex-1 overflow-auto p-4 md:p-8 flex justify-center bg-[#f4f5f7]">
              <div className={`bg-white shadow-sm shrink-0 w-[800px] max-w-full min-h-[1000px] p-8 md:p-16 transition-all duration-700 ease-in-out ${
                documentStyle === 'beautified' ? 'text-gray-900 leading-loose' : 'text-gray-800 leading-normal'
              }`}>
                <h1 className={`mb-8 transition-all duration-700 ${
                  documentStyle === 'beautified' ? 'text-4xl font-black text-blue-800' : 'text-3xl font-bold'
                }`}>腾讯文档</h1>
                
                <div className="w-full h-48 bg-blue-50 rounded-lg mb-8 flex items-center justify-center overflow-hidden relative">
                  <div className="absolute inset-0 bg-gradient-to-br from-blue-100 to-blue-300 opacity-50"></div>
                  <div className="z-10 text-blue-600 font-bold text-xl flex items-center gap-2">
                    <FileText /> 腾讯文档
                  </div>
                </div>

                <p className={`mb-6 transition-all duration-700 ${
                  documentStyle === 'beautified' ? 'text-lg font-serif indent-8 text-gray-700' : 'text-base'
                }`}>
                  腾讯文档是一款可多人协作的在线文档。支持在线文档、在线表格、在线幻灯片、在线PDF和收集表类型，打开网页就能查看和编辑，云端实时保存；可多人实时编辑文档，权限安全可控。
                </p>

                <h2 className={`mt-10 mb-4 transition-all duration-700 ${
                  documentStyle === 'beautified' ? 'text-2xl font-bold text-blue-700 border-b-2 border-blue-100 pb-2' : 'text-xl font-bold'
                }`}>让协作更高效</h2>
                <ul className={`list-disc pl-5 mb-6 space-y-2 transition-all duration-700 ${
                  documentStyle === 'beautified' ? 'text-base text-gray-600 marker:text-blue-500' : 'text-sm text-gray-700'
                }`}>
                  <li>多人编辑：支持多人同时在线编辑，可查看编辑记录；</li>
                  <li>多端同步：多类型设备皆可顺畅访问，随时随地轻松使用；</li>
                  <li>文档分享：生成链接或长图，分享给QQ/TIM/微信好友、微博及朋友圈，方便快捷。</li>
                </ul>

                <h2 className={`mt-10 mb-4 transition-all duration-700 ${
                  documentStyle === 'beautified' ? 'text-2xl font-bold text-blue-700 border-b-2 border-blue-100 pb-2' : 'text-xl font-bold'
                }`}>创作更轻松</h2>
                <p className={`mb-6 transition-all duration-700 ${
                  documentStyle === 'beautified' ? 'text-lg font-serif indent-8 text-gray-700' : 'text-base'
                }`}>
                  无需特意保存，电脑断电、网络异常，一切仍在那里；支持Markdown语法，高效创作。
                </p>
              </div>
            </div>
          </div>

          {/* 右侧：AI 侧边栏 (调整为 320px 黄金尺寸，强约束宽度不变形) */}
          <div className="w-[320px] shrink-0 bg-white border-l border-gray-200 flex flex-col shadow-[-4px_0_15px_rgba(0,0,0,0.02)] z-20">
            
            {/* 侧边栏 Header */}
            <div className="h-14 border-b border-gray-100 flex items-center px-4 justify-between bg-white shrink-0">
              <div className="flex items-center gap-2">
                {panelView === 'customLayout' ? (
                  <button 
                    onClick={() => setPanelView('chat')}
                    className="p-1 -ml-1 hover:bg-gray-100 rounded-md transition-colors flex items-center text-gray-600"
                  >
                    <ChevronLeft className="w-5 h-5" />
                    <span className="font-medium text-[15px] ml-0.5">排版美化</span>
                  </button>
                ) : (
                  <>
                    <div className="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                      <Sparkles className="w-3.5 h-3.5" />
                    </div>
                    <span className="font-medium text-[15px] text-gray-800">AI 文档助手</span>
                  </>
                )}
              </div>
              <button className="text-gray-400 hover:text-gray-600">
                <Menu className="w-5 h-5" />
              </button>
            </div>

            {/* 动态切换内容区 */}
            {panelView === 'chat' ? (
              <ChatView 
                messages={messages} 
                isTyping={isTyping} 
                chatEndRef={chatEndRef}
                inputValue={inputValue}
                setInputValue={setInputValue}
                handleQuickActionBeautify={handleQuickActionBeautify}
                handleFileUpload={handleFileUpload}
                setPanelView={setPanelView}
                fileInputRef={fileInputRef}
              />
            ) : (
              <CustomLayoutView 
                onSubmit={handleCustomLayoutSubmit} 
              />
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 视图1：聊天视图 (Chat View)
    // ==========================================
    function ChatView({ 
      messages, isTyping, chatEndRef, 
      inputValue, setInputValue, 
      handleQuickActionBeautify, handleFileUpload, setPanelView, fileInputRef 
    }) {
      return (
        <>
          <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4 bg-[#FAFAFC]">
            {messages.map((msg) => (
              <div key={msg.id} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                
                {msg.type === 'text' && (
                  <div className={`max-w-[88%] p-3 rounded-2xl text-[14px] leading-relaxed ${
                    msg.role === 'user' 
                      ? 'bg-blue-600 text-white rounded-tr-sm' 
                      : 'bg-white border border-gray-100 text-gray-800 shadow-sm rounded-tl-sm'
                  }`}>
                    {msg.content}
                  </div>
                )}

                {msg.type === 'file' && (
                  <div className="max-w-[88%] bg-blue-600 text-white p-3 rounded-2xl rounded-tr-sm text-[14px]">
                    <div className="flex items-center gap-2 p-2 bg-blue-700/50 rounded-lg mb-2">
                      <FileText className="w-4 h-4 text-blue-200 shrink-0" />
                      <span className="truncate text-sm">{msg.fileName}</span>
                    </div>
                    <p className="opacity-90 leading-relaxed">{msg.content}</p>
                  </div>
                )}

                {msg.type === 'process' && (
                  <div className="w-[95%] bg-white border border-gray-100 text-gray-800 shadow-sm rounded-2xl rounded-tl-sm p-4">
                    <div className="flex items-center gap-2 mb-3">
                      {!msg.isDone ? (
                        <div className="w-4 h-4 border-2 border-blue-600 border-t-transparent rounded-full animate-spin shrink-0"></div>
                      ) : (
                        <CheckCircle2 className="w-4 h-4 text-green-500 shrink-0" />
                      )}
                      <span className="font-medium text-[14px] text-blue-600 break-words">{msg.content}</span>
                    </div>
                    <div className="space-y-2 text-[13px] text-gray-500 pl-6 border-l-2 border-gray-100 ml-1.5">
                      {msg.steps.map((step, i) => (
                        <div key={i} className={`transition-opacity duration-500 ${msg.isDone ? 'opacity-100' : 'opacity-70 animate-pulse'}`}>
                          {step}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {msg.type === 'widget' && msg.widgetType === 'beautify_options' && (
                  <div className="w-full bg-white border border-gray-100 shadow-sm rounded-xl p-3 flex flex-col gap-2">
                    <p className="text-[14px] text-gray-700 mb-1 px-1">{msg.content}</p>
                    
                    <button 
                      onClick={() => fileInputRef.current?.click()}
                      className="w-full flex items-center justify-between p-3 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-all text-left group"
                    >
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 shrink-0 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                          <Upload className="w-4 h-4" />
                        </div>
                        <div className="min-w-0">
                          <div className="text-[14px] font-medium text-gray-800 truncate">上传格式模板</div>
                          <div className="text-[12px] text-gray-500 truncate">上传你的文档，AI自动学习</div>
                        </div>
                      </div>
                      <ChevronLeft className="w-4 h-4 text-gray-400 rotate-180 shrink-0" />
                    </button>
                    <input 
                      type="file" 
                      ref={fileInputRef} 
                      className="hidden" 
                      accept=".doc,.docx,.pdf"
                      onChange={handleFileUpload}
                    />

                    <button 
                      onClick={() => setPanelView('customLayout')}
                      className="w-full flex items-center justify-between p-3 rounded-lg border border-gray-200 hover:border-blue-400 hover:bg-blue-50 transition-all text-left group"
                    >
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 shrink-0 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 group-hover:bg-purple-600 group-hover:text-white transition-colors">
                          <LayoutTemplate className="w-4 h-4" />
                        </div>
                        <div className="min-w-0">
                          <div className="text-[14px] font-medium text-gray-800 truncate">自定义排版</div>
                          <div className="text-[12px] text-gray-500 truncate">手动选择场景、字体参数</div>
                        </div>
                      </div>
                      <ChevronLeft className="w-4 h-4 text-gray-400 rotate-180 shrink-0" />
                    </button>
                  </div>
                )}
              </div>
            ))}
            
            {isTyping && (
              <div className="flex items-start">
                <div className="bg-white border border-gray-100 shadow-sm rounded-2xl rounded-tl-sm px-4 py-3 flex gap-1 items-center">
                  <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></span>
                  <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.2s' }}></span>
                  <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.4s' }}></span>
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          <div className="p-3 bg-white border-t border-gray-100 flex flex-col gap-2 shrink-0">
            <div className="flex gap-2 overflow-x-auto pb-1" style={{ WebkitOverflowScrolling: 'touch' }}>
              <button className="whitespace-nowrap flex items-center gap-1.5 px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-[13px] text-gray-700 hover:bg-gray-100 shrink-0">
                <LayoutTemplate className="w-3.5 h-3.5" /> 生成 PPT
              </button>
              <button 
                onClick={handleQuickActionBeautify}
                className="whitespace-nowrap flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 border border-blue-200 text-blue-700 rounded-full text-[13px] hover:bg-blue-100 transition-colors shrink-0"
              >
                <Sparkles className="w-3.5 h-3.5" /> 排版美化
              </button>
              <button className="whitespace-nowrap flex items-center gap-1.5 px-3 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-[13px] text-gray-700 hover:bg-gray-100 shrink-0">
                <Settings2 className="w-3.5 h-3.5" /> 思维导图
              </button>
            </div>

            <div className="relative flex items-end border border-gray-200 rounded-xl bg-gray-50 focus-within:bg-white focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 transition-all">
              <button className="p-3 text-gray-400 hover:text-gray-600 shrink-0">
                <Paperclip className="w-5 h-5" />
              </button>
              <textarea 
                value={inputValue}
                onChange={(e) => setInputValue(e.target.value)}
                placeholder="有问题，尽管问..."
                className="flex-1 bg-transparent py-3 px-1 text-[14px] resize-none outline-none max-h-32 min-h-[44px]"
                rows="1"
              />
              <button className={`p-2.5 m-1 rounded-lg flex items-center justify-center transition-colors shrink-0 ${
                inputValue.trim() ? 'bg-blue-600 text-white shadow-sm' : 'bg-gray-200 text-gray-400'
              }`}>
                <Send className="w-4 h-4" />
              </button>
            </div>
          </div>
        </>
      );
    }

    // ==========================================
    // 视图2：自定义排版表单视图 (Custom Layout View)
    // ==========================================
    function CustomLayoutView({ onSubmit }) {
      const [activeTab, setActiveTab] = useState('daily');
      
      const [selections, setSelections] = useState({
        scene: '生活娱乐',
        fontStyle: '自然',
        layoutReq: '宽松',
        feature: '丰富',
        color: '彩色活力',
        bg: '练色'
      });

      const [proSelections, setProSelections] = useState({
        fontFamily: '华文新魏',
        fontSize: '五号',
        mainFont: '宋体',
        lineHeight: '2倍行距',
        indent: '首行缩进'
      });

      const renderDropdown = (label, value, onChange, options) => (
        <div className="mb-5">
          <div className="text-[13px] font-medium text-gray-600 mb-2">{label}</div>
          <div className="relative">
            <select 
              value={value}
              onChange={(e) => onChange(e.target.value)}
              className="w-full bg-white border border-gray-200 hover:border-blue-400 text-gray-800 text-[13px] rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-500 block p-2.5 outline-none appearance-none transition-colors cursor-pointer"
            >
              {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
            </select>
            <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>
      );

      const renderSegmentedControl = (label, value, onChange, options) => (
        <div className="mb-5">
          <div className="text-[13px] font-medium text-gray-600 mb-2">{label}</div>
          <div className="flex p-1 bg-gray-100 rounded-lg">
            {options.map(opt => (
              <button
                key={opt}
                onClick={() => onChange(opt)}
                className={`flex-1 py-1.5 text-[13px] rounded-md transition-all duration-200 truncate px-1 ${
                  value === opt 
                    ? 'bg-white text-blue-600 shadow-sm font-medium' 
                    : 'text-gray-600 hover:text-gray-800 hover:bg-gray-200/50'
                }`}
              >
                {opt}
              </button>
            ))}
          </div>
        </div>
      );

      const handleSubmit = () => {
        let promptText = activeTab === 'daily'
          ? `帮我将文档的格式按照以下偏好来调整：使用场景为「${selections.scene}」，字体风格为「${selections.fontStyle}」，排版要求为「${selections.layoutReq}」，版式特征为「${selections.feature}」，主题颜色为「${selections.color}」，页面底纹为「${selections.bg}」。`
          : `帮我将文档的标题字体改为「${proSelections.fontFamily}」，字号为「${proSelections.fontSize}」，正文字体为「${proSelections.mainFont}」，行距改为「${proSelections.lineHeight}」，完成中文段落排版与「${proSelections.indent}」。`;
        onSubmit(promptText);
      };

      return (
        <div className="flex-1 flex flex-col bg-white overflow-hidden min-h-0">
          
          {/* 顶部 Tabs (shrink-0 固定高度) */}
          <div className="flex px-4 border-b border-gray-100 shrink-0">
            <button 
              onClick={() => setActiveTab('daily')}
              className={`flex-1 text-center py-3 text-[14px] font-medium relative ${activeTab === 'daily' ? 'text-blue-600' : 'text-gray-500 hover:text-gray-800'}`}
            >
              日常排版
              {activeTab === 'daily' && <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-blue-600 rounded-t-full"></div>}
            </button>
            <button 
              onClick={() => setActiveTab('pro')}
              className={`flex-1 text-center py-3 text-[14px] font-medium relative ${activeTab === 'pro' ? 'text-blue-600' : 'text-gray-500 hover:text-gray-800'}`}
            >
              AI 专业排版
              {activeTab === 'pro' && <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-8 h-0.5 bg-blue-600 rounded-t-full"></div>}
            </button>
          </div>

          {/* 中间滚动表单区 (移除 pb-24，让 flex 自动计算高度) */}
          <div className="flex-1 overflow-y-auto p-4 md:p-5">
            {activeTab === 'daily' ? (
              <div className="animate-in fade-in duration-300">
                
                {renderDropdown('使用场景', selections.scene, (val) => setSelections({...selections, scene: val}), ['校园学习', '职场办公', '生活娱乐', '其他'])}

                <div className="mb-5">
                  <div className="text-[13px] font-medium text-gray-600 mb-2">字体风格</div>
                  <div className="grid grid-cols-2 gap-2.5">
                    {[
                      { id: '活泼', class: 'font-sans font-black tracking-wide', desc: '轻松休闲' },
                      { id: '自然', class: 'font-sans text-gray-700', desc: '阅读舒适' },
                      { id: '严肃', class: 'font-serif font-bold', desc: '传统正式' },
                      { id: '整齐', class: 'font-mono text-gray-700', desc: '条理清晰' }
                    ].map(style => (
                      <button
                        key={style.id}
                        onClick={() => setSelections({...selections, fontStyle: style.id})}
                        className={`flex flex-col items-start p-2.5 rounded-lg border text-left transition-all ${
                          selections.fontStyle === style.id
                            ? 'border-blue-500 bg-blue-50 ring-1 ring-blue-500'
                            : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'
                        }`}
                      >
                        <span className={`text-[14px] mb-1 ${style.class}`}>Aa {style.id}</span>
                        <span className="text-[11px] text-gray-500 leading-tight">{style.desc}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {renderSegmentedControl('排版要求', selections.layoutReq, (val) => setSelections({...selections, layoutReq: val}), ['常规', '紧凑', '宽松'])}
                {renderSegmentedControl('版式特征', selections.feature, (val) => setSelections({...selections, feature: val}), ['简洁', '规范', '丰富'])}

                <div className="mb-5">
                  <div className="text-[13px] font-medium text-gray-600 mb-2">主题颜色</div>
                  <div className="flex gap-4">
                    {[
                      { id: '黑白简约', color: 'bg-gray-800' },
                      { id: '米色质感', color: 'bg-[#E5DCC5]' },
                      { id: '彩色活力', color: 'bg-gradient-to-tr from-pink-500 via-purple-500 to-blue-500' }
                    ].map(theme => (
                      <button
                        key={theme.id}
                        onClick={() => setSelections({...selections, color: theme.id})}
                        title={theme.id}
                        className={`relative w-7 h-7 rounded-full shadow-sm flex items-center justify-center transition-all ${theme.color} ${
                          selections.color === theme.id ? 'ring-2 ring-offset-2 ring-blue-500 scale-110' : 'hover:scale-105 border border-gray-200'
                        }`}
                      >
                        {selections.color === theme.id && <Check className={`w-3.5 h-3.5 ${theme.id === '米色质感' ? 'text-gray-800' : 'text-white'}`} />}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="mb-2">
                  <div className="text-[13px] font-medium text-gray-600 mb-2">页面底纹</div>
                  <div className="grid grid-cols-4 gap-2">
                    {[
                      { id: '白色', style: 'bg-white' },
                      { id: '练色', style: 'bg-[#Fdf5e6]' }, 
                      { id: '圆点纹', style: 'bg-white bg-[radial-gradient(#d1d5db_1.5px,transparent_1.5px)] bg-[size:10px_10px]' },
                      { id: '网格纹', style: 'bg-white bg-[linear-gradient(#f3f4f6_1px,transparent_1px),linear-gradient(90deg,#f3f4f6_1px,transparent_1px)] bg-[size:12px_12px]' }
                    ].map(bg => (
                      <button
                        key={bg.id}
                        onClick={() => setSelections({...selections, bg: bg.id})}
                        className={`h-12 rounded-md border flex flex-col items-center justify-end pb-1.5 overflow-hidden relative transition-all ${bg.style} ${
                          selections.bg === bg.id ? 'border-blue-500 ring-1 ring-blue-500' : 'border-gray-200 hover:border-gray-300 shadow-sm'
                        }`}
                      >
                        <span className="text-[11px] font-medium text-gray-700 bg-white/80 px-1 rounded backdrop-blur-sm relative z-10 scale-90 md:scale-100">{bg.id}</span>
                      </button>
                    ))}
                  </div>
                </div>

              </div>
            ) : (
              <div className="animate-in fade-in duration-300">
                 {renderDropdown('标题字体', proSelections.fontFamily, (val) => setProSelections({...proSelections, fontFamily: val}), ['华文新魏', '黑体', '微软雅黑', '楷体'])}
                 {renderDropdown('标题字号', proSelections.fontSize, (val) => setProSelections({...proSelections, fontSize: val}), ['一号', '二号', '三号', '四号', '五号'])}
                 {renderDropdown('正文字体', proSelections.mainFont, (val) => setProSelections({...proSelections, mainFont: val}), ['宋体', '仿宋', '微软雅黑', 'Arial'])}
                 {renderDropdown('正文行距', proSelections.lineHeight, (val) => setProSelections({...proSelections, lineHeight: val}), ['单倍行距', '1.15倍行距', '1.5倍行距', '2倍行距'])}
                 {renderDropdown('段落格式', proSelections.indent, (val) => setProSelections({...proSelections, indent: val}), ['首行缩进', '悬挂缩进', '无缩进'])}
              </div>
            )}
          </div>

          {/* 底部固定操作栏 (移除 absolute，改用标准的 flex 流，shrink-0 固定高度) */}
          <div className="p-4 bg-white border-t border-gray-100 flex gap-3 shrink-0 z-20">
            <button 
              className="flex-1 py-2 rounded-lg bg-gray-50 text-gray-700 text-[14px] font-medium hover:bg-gray-100 transition-colors flex items-center justify-center gap-1 border border-gray-200 shrink-0"
              onClick={() => {
                if(activeTab === 'daily') {
                  setSelections({ scene: '其他', fontStyle: '自然', layoutReq: '常规', feature: '简洁', color: '黑白简约', bg: '白色' });
                }
              }}
            >
              <RotateCcw className="w-4 h-4" /> 重置
            </button>
            <button 
              onClick={handleSubmit}
              className="flex-[2] py-2 rounded-lg bg-blue-600 text-white text-[14px] font-medium hover:bg-blue-700 transition-colors shadow-sm shadow-blue-200 shrink-0"
            >
              完成并应用
            </button>
          </div>
        </div>
      );
    }

    // 将 App 组件渲染到 root 节点
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
